<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#E1442D"/>
  <!-- Subtle grain texture overlay -->
  <rect width="512" height="512" rx="112" fill="url(#grain)" opacity="0.08"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Fork (left) -->
  <g fill="white">
    <!-- Tines -->
    <rect x="148" y="90" width="22" height="120" rx="11"/>
    <rect x="188" y="90" width="22" height="120" rx="11"/>
    <rect x="228" y="90" width="22" height="120" rx="11"/>
    <!-- Base of fork -->
    <rect x="148" y="204" width="102" height="22" rx="11"/>
    <!-- Handle -->
    <rect x="189" y="218" width="22" height="140" rx="11"/>
  </g>

  <!-- Plate / circle -->
  <circle cx="310" cy="310" r="115" fill="none" stroke="white" stroke-width="18" opacity="0.9"/>
  <circle cx="310" cy="310" r="78" fill="white" opacity="0.12"/>

  <!-- Brain emoji — the dopamine icon of the game -->
  <text x="310" y="335" text-anchor="middle" font-size="80" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🧠</text>

  <!-- Small text: FK -->
  <text x="256" y="470" text-anchor="middle" font-size="42" font-weight="900"
        font-family="'Helvetica Neue', Arial, sans-serif" fill="white" opacity="0.6"
        letter-spacing="8">FORKLIFT</text>
</svg>
